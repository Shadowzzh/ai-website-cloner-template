        - generic [ref=e42]: AI级企业操作系统 DeepexiOS 平台
        - paragraph [ref=e44]: DeepexiOS 作为 AI 级企业操作系统是以 Deepexi 企业大模型与 FastAGI 企业智能体平台协同而成。可面向客户构建企业级 Skill 能力单元；通过多类企业级 Skills 组合形成 AI 员工，再由多名 AI 员工协同组建不同领域的行业智能体。目前已落地三大核心智能体，分别为工业智能体 DeepSense、运营智能体 DataSense 及企业基础智能体 DeepClaw，以智能体模式，持续稳定地为行业客户交付业务价值。
      - generic [ref=e45]:
        - img [ref=e48]
        - generic [ref=e50]:
          - generic [ref=e51]:
            - img [ref=e53]
            - generic [ref=e54]: DeepSense 工业智能体
            - paragraph [ref=e56]: 覆盖了工程与产品设计、BOM 分析、工艺优化、故障维修、NC 研发等岗位的 Skills，聚焦工业业务场景，具备稳定可靠的执行能力与长期记忆特性，深度融合工业知识与操作规范，支持工业场景专属编码，通过 Skill 灵活组合，提供可控、可追溯的面向生产执行、工艺优化、故障检测等工业场景企业级 AI 员工。
          - generic [ref=e57]:
            - img [ref=e59]
            - generic [ref=e60]: DataSense 运营智能体
            - paragraph [ref=e62]: 覆盖了运营决策、商品企划、货品管理、财税筹划等岗位的 Skills，具备以“统一业务语言 、固化专家经验与驱动自动执行”为核心，融合指标平台与大模型推理，通过可组合的 Skills，实现从数据查询、场景洞察、深度探索到业务执行的闭环，达成在各业务场景下的企业级 AI 员工。
          - generic [ref=e63]:
            - img [ref=e150]
            - generic [ref=e65]: DeepClaw 企业基础智能体
            - paragraph [ref=e67]: 覆盖了数据治理运维、代码开发、产业政策服务等基础岗位的 Skills。具备个性与长期记忆能力的企业级 AI 员工框架，融合企业背景知识与行为规范，提供可控、可审计的执行过程，并支持云端、边缘端等多种运行形态，依托丰富的 Skills 组合，提供实现高效执行的企业级 AI 员工。
