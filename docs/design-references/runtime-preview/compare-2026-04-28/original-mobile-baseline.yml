        - generic [ref=e33]: AI级企业操作系统 DeepexiOS 平台
        - paragraph [ref=e35]: DeepexiOS 作为 AI 级企业操作系统是以 Deepexi 企业大模型与 FastAGI 企业智能体平台协同而成。可面向客户构建企业级 Skill 能力单元；通过多类企业级 Skills 组合形成 AI 员工，再由多名 AI 员工协同组建不同领域的行业智能体。目前已落地三大核心智能体，分别为工业智能体 DeepSense、运营智能体 DataSense 及企业基础智能体 DeepClaw，以智能体模式，持续稳定地为行业客户交付业务价值。
      - generic [ref=e36]:
        - img [ref=e39]
        - generic [ref=e41]:
          - generic [ref=e42]:
            - img [ref=e44]
            - generic [ref=e45]: DeepSense 工业智能体
            - paragraph [ref=e47]: 覆盖了工程与产品设计、BOM 分析、工艺优化、故障维修、NC 研发等岗位的 Skills，聚焦工业业务场景，具备稳定可靠的执行能力与长期记忆特性，深度融合工业知识与操作规范，支持工业场景专属编码，通过 Skill 灵活组合，提供可控、可追溯的面向生产执行、工艺优化、故障检测等工业场景企业级 AI 员工。
          - generic [ref=e48]:
            - img [ref=e50]
            - generic [ref=e51]: DataSense 运营智能体
            - paragraph [ref=e53]: 覆盖了运营决策、商品企划、货品管理、财税筹划等岗位的 Skills，具备以“统一业务语言 、固化专家经验与驱动自动执行”为核心，融合指标平台与大模型推理，通过可组合的 Skills，实现从数据查询、场景洞察、深度探索到业务执行的闭环，达成在各业务场景下的企业级 AI 员工。
          - generic [ref=e54]:
            - img [ref=e56]
            - generic [ref=e57]: DeepClaw 企业基础智能体
            - paragraph [ref=e59]: 覆盖了数据治理运维、代码开发、产业政策服务等基础岗位的 Skills。具备个性与长期记忆能力的企业级 AI 员工框架，融合企业背景知识与行为规范，提供可控、可审计的执行过程，并支持云端、边缘端等多种运行形态，依托丰富的 Skills 组合，提供实现高效执行的企业级 AI 员工。
    - text:  
    - generic [ref=e60]:
      - generic [ref=e62]:
        - generic [ref=e63]: FastAGI 企业级人工智能解决方案
        - generic [ref=e64]:
          - paragraph [ref=e67]: FastAGI是基于自有企业级多模态大模型技术栈构建的Agentic人工智能解决方案，旨在无缝集成及加速跨业务职能实施AI解决方案。FastAGI解决方案通过提供深度运营决策支持及生产力增强工具，直接解决核心业务挑战。通过为每位员工提供涵盖企业范围和行业特定资料的综合知识库，旨在使企业能够作出更明智、更有影响力的业务决策。
          - img [ref=e69]
      - generic [ref=e71]:
        - generic [ref=e72]: Deepexi企业大模型
        - generic [ref=e73]:
          - paragraph [ref=e76]: Deepexi 企业大模型并非仅依托互联网公开数据的通用 AI，其通过学习企业内部业务逻辑、专有名词与历史数据，形成企业“独一家”的认知，具备企业内部的沟通语境。结合本体论构建专属数据模型，认知精度领先同类产品，融合 SQL、Python 等代码能力，可操作后台、对接 ERP，实现从对话式 AI 到行动型 Agent 的跨越，规范执行业务。
          - img [ref=e77]
